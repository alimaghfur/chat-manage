version: '3.8'

services:
  api:
    build: ./api
    container_name: wa-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./data/wa.db
      - PORT=3001
      - NODE_ENV=production
      - API_MASTER_KEY=${API_MASTER_KEY:-changeme-master-key}
      - REDIS_URL=${REDIS_URL:-}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-wa-media}
    volumes:
      - wa-sessions:/app/sessions
      - wa-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    profiles:
      - full

  # Optional: MinIO for S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: wa-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    profiles:
      - full

volumes:
  wa-sessions:
  wa-data:
  redis-data:
  minio-data:
